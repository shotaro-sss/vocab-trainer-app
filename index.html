<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Junpei Training</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log("Service Worker registered", reg))
          .catch(err => console.error("Service Worker registration failed", err));
      });
    }
  </script>
</head>
<body>
  <h1>Junpei Training</h1>
  <div id="timer">残り時間 計算中...</div>
  <div id="progressText">0 / 30</div>
  <div id="barBox">
    <div id="bar"></div>
  </div>
  <img id="warningImg" width="200" alt="残り時間警告">
  <hr>
  <h2 id="question">Loading...</h2>
  <div id="choices"></div>
  <div id="gachaModal" class="modal">
    <div class="modal-content">
      <h2 class="gacha-title">⭐️ RESULT ⭐️</h2>
      <div id="gachaResult" class="gacha-cards"></div>
      <button id="closeGachaBtn" class="back-btn">戻る</button>
    </div>
  </div>

  <!-- ★ここに音源のaudioタグを追加★ -->
  <audio id="soundCorrect" preload="auto">
    <source src="sounds/correct.mp3" type="audio/mpeg">
  </audio>
  <audio id="soundWrong" preload="auto">
    <source src="sounds/wrong.mp3" type="audio/mpeg">
  </audio>
  <audio id="soundComplete" preload="auto">
    <source src="sounds/complete.mp3" type="audio/mpeg">
  </audio>
  <audio id="soundGacha" preload="auto">
    <source src="sounds/gacha.mp3" type="audio/mpeg">
  </audio>

  <script src="app.js"></script>
</body>
</html>
